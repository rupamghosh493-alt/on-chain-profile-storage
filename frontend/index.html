<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile Storage on Stellar</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <header>
            <h1>On-Chain Profile</h1>
            <p class="subtitle">Store your identity on the Stellar blockchain</p>
        </header>

        <main>
            <!-- Setup & Connect Section -->
            <section class="card setup-section">
                <h2>Network Setup</h2>
                <div class="input-group">
                    <label for="contractId">Contract ID</label>
                    <input type="text" id="contractId" placeholder="C..." value="">
                </div>
                <!-- Demo mode note -->
                <div class="demo-note">
                    Use "demo" as Contract ID to simulate locally, or enter a real ID.
                </div>
                <button id="connectBtn" class="primary-btn">Connect with Freighter Wallet</button>
                <div id="connectionStatus" class="status-message"></div>
            </section>

            <div class="grid-layout hidden" id="mainAppContent">
                <!-- Update Profile Section -->
                <section class="card edit-section">
                    <h2>Update Profile</h2>
                    <form id="profileForm">
                        <div class="input-group">
                            <label for="nameInput">Name</label>
                            <input type="text" id="nameInput" placeholder="e.g. Satoshi" required>
                        </div>
                        <div class="input-group">
                            <label for="bioInput">Bio</label>
                            <textarea id="bioInput" rows="4" placeholder="Tell us about yourself..." required></textarea>
                        </div>
                        <button type="submit" class="primary-btn submit-btn" id="saveBtn">
                            Save to Blockchain
                            <span class="loader hidden" id="saveLoader"></span>
                        </button>
                    </form>
                    <div id="saveStatus" class="status-message"></div>
                </section>

                <!-- View Profile Section -->
                <section class="card view-section">
                    <h2>My Profile</h2>
                    <div class="profile-card">
                        <div class="avatar-placeholder" id="avatarInitials">?</div>
                        <div class="profile-details">
                            <h3 id="displayName">Not Found</h3>
                            <p id="displayBio" class="bio-text">No profile data available.</p>
                        </div>
                    </div>
                    <button id="refreshBtn" class="secondary-btn mt-4">
                        Refresh Profile
                        <span class="loader hidden" id="refreshLoader"></span>
                    </button>
                </section>
            </div>

            <!-- Find Profile Section -->
            <div class="search-layout hidden" id="searchAppContent">
                <section class="card search-section">
                    <h2>Find an On-Chain Profile</h2>
                    <div class="search-group">
                        <input type="text" id="searchAddressInput" placeholder="Enter Stellar Address (G...)">
                        <button id="searchBtn" class="primary-btn">Search</button>
                    </div>
                    <div id="searchResult" class="profile-card hidden mt-4">
                        <div class="avatar-placeholder" id="searchAvatar">?</div>
                        <div class="profile-details">
                            <h3 id="searchDisplayName">Not Found</h3>
                            <p id="searchDisplayBio" class="bio-text">No profile data available.</p>
                        </div>
                    </div>
                    <div id="searchStatus" class="status-message"></div>
                </section>
            </div>
        </main>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/stellar-sdk/12.2.0/stellar-sdk.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/stellar-freighter-api/1.5.0/index.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
